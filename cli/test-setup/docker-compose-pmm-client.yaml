version: '3.7'

services:
  pmm-server:
    container_name: pmm-server-1
    image: ${DOCKER_VERSION:-perconalab/pmm-server:3-dev-latest}
    ports:
      - "2553:8443"
      - "8085:8080"
    environment:
      - PMM_DEBUG=1
    networks:
      - docker-client-check

  pmm-client:
    container_name: pmm-client-1
    image: ${CLIENT_DOCKER_VERSION:-perconalab/pmm-client:3-dev-latest}
    environment:
      - PMM_AGENT_SERVER_ADDRESS=pmm-server-1:8443
      - PMM_AGENT_SERVER_USERNAME=admin
      - PMM_AGENT_SERVER_PASSWORD=admin
      - PMM_AGENT_SERVER_INSECURE_TLS=1
      - PMM_AGENT_SETUP=1
      - PMM_AGENT_SETUP_FORCE=1
      - PMM_AGENT_CONFIG_FILE=/usr/local/percona/pmm/config/pmm-agent.yaml
    depends_on:
      pmm-server:
        condition: service_healthy
      ps:
        condition: service_started
      mongodb:
        condition: service_started
      postgres:
        condition: service_started
    entrypoint: ["/bin/bash", "-lc"]
    command: |
      set -e
      pmm-agent-entrypoint &

      for host in ps:3306 mongodb:27017 postgres:5432; do
        echo "Waiting for $$host..."
        h="$${host%%:*}"
        p="$${host##*:}"
        until nc -z "$$h" "$$p"; do sleep 2; done
      done
      echo "Adding MySQL..."
      pmm-admin add mysql --service-name=mysql-ps --username=pmm --password=pmm-pass --address=ps:3306
      echo "Adding MongoDB..."
      pmm-admin add mongodb --service-name=mongodb-psmdb --username=pmm --password=pmm-pass --address=mongodb:27017 --authentication-database=admin
      echo "Adding PostgreSQL..."
      pmm-admin add postgresql --service-name=postgres-pdpgsql --username=pmm --password=pmm-pass --address=postgres:5432
      wait -n
    networks:
      - docker-client-check

  ps:
    container_name: ps-1
    image: percona:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=pmm
      - MYSQL_PASSWORD=pmm-pass
      - PMM_AGENT_SERVER_ADDRESS=pmm-server:8443
    networks:
      - docker-client-check

  mongodb:
    container_name: psmdb-1
    image: percona/percona-server-mongodb:7.0
    environment:
      - PMM_AGENT_SERVER_ADDRESS=pmm-server:8443
      - MONGO_INITDB_ROOT_USERNAME=pmm
      - MONGO_INITDB_ROOT_PASSWORD=pmm-pass
    networks:
      - docker-client-check

  postgres:
    container_name: pdpgsql-1
    image: percona/percona-distribution-postgresql:16
    environment:
      - POSTGRES_USER=pmm
      - POSTGRES_PASSWORD=pmm-pass
      - PMM_AGENT_SERVER_ADDRESS=pmm-server:8443
    networks:
      - docker-client-check

networks:
  docker-client-check:
